<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <title>Sign in — Instant Quoting Tool</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="icon" href="favicon.ico"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script>(function(){var t=localStorage.getItem('cs-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    :root{--cs-green:#00A94F;--cs-green-dark:#00853F;}
    [data-theme="dark"]{--bg:#1a1d23;--card:#282c34;--border:#373c46;--text:#e0e4ea;--sub:#9ca3af;}
    [data-theme="light"]{--bg:#f0f2f5;--card:#ffffff;--border:#e8e8e8;--text:#4D4D4F;--sub:#77787B;}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:"Roboto",sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .top-bar{background:linear-gradient(135deg,#00853F,#00A94F);height:4px;width:100%;position:fixed;top:0}
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:2.5rem 2rem;width:100%;max-width:380px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.25)}
    .logo{height:40px;margin-bottom:1rem}
    h1{font-size:1.25rem;font-weight:700;margin-bottom:.3rem}
    .sub{font-size:.85rem;color:var(--sub);margin-bottom:2rem}
    .btn-google{
      display:inline-flex;align-items:center;justify-content:center;gap:.75rem;
      background:#fff;color:#3c4043;
      border:1px solid #dadce0;border-radius:6px;
      padding:.75rem 1.25rem;width:100%;font-size:.9rem;font-weight:500;
      cursor:pointer;text-decoration:none;font-family:inherit;
      transition:box-shadow .15s,background .15s;
    }
    .btn-google:hover{background:#f8f9fa;box-shadow:0 1px 4px rgba(0,0,0,.2)}
    .btn-google svg{flex-shrink:0}
    .error{margin-top:1rem;font-size:.8rem;color:#f87171;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:6px;padding:.5rem .75rem}
    .footer{margin-top:1.5rem;font-size:.72rem;color:var(--sub)}
  </style>
</head>
<body>
<div class="top-bar"></div>
<div class="card">
  <img id="logo" src="logo-dark-bg.png" alt="CloudSigma" class="logo"/>
  <h1>Instant Quoting Tool</h1>
  <p class="sub">Sign in to access your quotes and pricing workspace.</p>

  <a href="/auth/google" class="btn-google">
    <svg width="20" height="20" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Sign in with Google
  </a>

  <div id="errBox" style="display:none" class="error">Authentication failed. Please try again.</div>
  <p class="footer">CloudSigma &bull; Instant Quoting Tool</p>
</div>
<script>
  // Show error if ?error=1
  if(window.location.search.includes('error=1')){
    document.getElementById('errBox').style.display='block';
  }
  // Swap logo for light theme
  var t=localStorage.getItem('cs-theme')||'dark';
  document.getElementById('logo').src=t==='dark'?'logo-dark-bg.png':'logo-white-bg.png';
</script>
</body>
</html>
